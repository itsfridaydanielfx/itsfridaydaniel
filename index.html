<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>@itsfridaydaniel</title>
<meta name="description" content="Aplikacje i wtyczki dla producentów: Social Media Downloader, True BPM (analizator BPM i tonacji) oraz Jaki to type beat?" />

<meta property="og:title" content="@itsfridaydaniel" />
<meta property="og:description" content="Moje aplikacje i wtyczki dla producentów — wszystko w jednym miejscu." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   @itsfridaydaniel — strona w jednym pliku
   Edytujesz TYLKO sekcje SOCIALS i APPS na dole (w <script>).
   Brak animacji. Customowe grafiki aplikacji w kafelkach.
   ========================================================= */

:root{
  --bg:#07060c;
  --card:rgba(255,255,255,.024);
  --card-hover:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --border-hover:rgba(255,255,255,.2);
  --panel:#0c0a14;          /* tło mockupów aplikacji */
  --panel-2:#15121f;
  --text:#efeaf5;
  --muted:#a39bb3;
  --muted-2:#6a6378;

  --violet:#8b5cff;
  --magenta:#ff4fc3;
  --red:#ff5470;            /* downloader (MP3 highlight) */
  --peri:#6c63ff;           /* true bpm */
  --indigo:#5865f2;         /* discord */

  --radius:22px;
  --maxw:1180px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}

/* tło — statyczne poświaty (bez animacji) */
body::before,body::after{
  content:"";position:fixed;z-index:0;border-radius:50%;filter:blur(140px);opacity:.5;pointer-events:none;
}
body::before{ width:620px;height:620px;top:-240px;left:-180px;background:radial-gradient(circle,rgba(139,92,255,.55),transparent 70%); }
body::after{ width:680px;height:680px;bottom:-320px;right:-200px;background:radial-gradient(circle,rgba(255,79,195,.32),transparent 70%); }

.wrap{ position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 24px; }

/* =================== NAV =================== */
nav{ position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:26px 0; }
.brand{ display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px; }
.brand .dot{ width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--magenta));box-shadow:0 0 16px var(--violet); }
.nav-social{ display:flex;gap:8px; }
.icon-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:11px;color:var(--muted);
  transition:color .2s,border-color .2s,background .2s;
}
.icon-btn:hover{ color:var(--text);border-color:var(--border-hover);background:var(--card-hover); }
.icon-btn svg{ width:18px;height:18px; }

/* =================== HERO =================== */
header{ text-align:center;padding:50px 0 36px; }
h1{ font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,6vw,60px);line-height:1.04;letter-spacing:-.02em; }
h1 .grad{ background:linear-gradient(110deg,var(--violet),var(--magenta) 60%,var(--peri));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
.subtitle{ max-width:520px;margin:14px auto 0;color:var(--muted);font-size:clamp(14px,2vw,16.5px); }

/* =================== KAFELKI =================== */
.apps{ display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding-bottom:26px; }
.app-tile{
  position:relative;display:flex;flex-direction:column;text-decoration:none;color:inherit;min-height:460px;
  border:1px solid var(--border);border-radius:var(--radius);background:var(--card);overflow:hidden;isolation:isolate;
  transition:transform .25s cubic-bezier(.2,.7,.2,1),border-color .25s,background .25s,box-shadow .25s;
}
.app-tile:hover{ transform:translateY(-5px);border-color:var(--border-hover);background:var(--card-hover);box-shadow:0 28px 70px -32px rgba(0,0,0,.95); }
.app-tile .glow{ position:absolute;z-index:-1;width:340px;height:340px;border-radius:50%;filter:blur(80px);opacity:.32;top:-90px;right:-70px; }
.app-tile[data-accent="red"]    .glow{ background:var(--red); }
.app-tile[data-accent="peri"]   .glow{ background:var(--peri); }
.app-tile[data-accent="violet"] .glow{ background:var(--violet); }

/* obszar grafiki aplikacji */
.stage{ position:relative;height:300px;display:flex;align-items:center;justify-content:center;padding:22px;border-bottom:1px solid var(--border);overflow:hidden; }
.app-tile[data-accent="red"]    .stage{ background:radial-gradient(circle at 50% 35%, rgba(255,84,112,.14), transparent 62%); }
.app-tile[data-accent="peri"]   .stage{ background:radial-gradient(circle at 50% 35%, rgba(108,99,255,.16), transparent 62%); }
.app-tile[data-accent="violet"] .stage{ background:radial-gradient(circle at 50% 35%, rgba(139,92,255,.16), transparent 62%); }
.badge{
  position:absolute;top:16px;left:16px;z-index:3;display:inline-flex;align-items:center;gap:7px;
  font-size:11.5px;font-weight:600;letter-spacing:.04em;color:var(--text);
  border:1px solid var(--border-hover);padding:5px 11px;border-radius:999px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
}
.badge .b-dot{ width:6px;height:6px;border-radius:50%; }
.app-tile[data-accent="red"]    .b-dot{ background:var(--red); }
.app-tile[data-accent="peri"]   .b-dot{ background:var(--peri); }
.app-tile[data-accent="violet"] .b-dot{ background:var(--violet); }

.body{ padding:20px 24px 22px;display:flex;flex-direction:column;flex:1; }
.kicker{ font-size:12.5px;font-weight:600;margin-bottom:7px; }
.app-tile[data-accent="red"]    .kicker{ color:#ff8497; }
.app-tile[data-accent="peri"]   .kicker{ color:#9b95ff; }
.app-tile[data-accent="violet"] .kicker{ color:#b79bff; }
.body h3{ font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;letter-spacing:-.01em; }
.body p{ color:var(--muted);font-size:14px;margin-top:8px; }
.cta{
  align-self:flex-start;display:inline-flex;align-items:center;gap:8px;margin-top:auto;
  font-size:14px;font-weight:600;color:#fff;padding:11px 18px;border-radius:12px;border:1px solid var(--border-hover);
  background:rgba(255,255,255,.05);transition:transform .2s,background .2s,border-color .2s,box-shadow .2s;
}
.app-tile[data-accent="red"]    .cta{ background:rgba(255,84,112,.16);border-color:rgba(255,84,112,.5); }
.app-tile[data-accent="peri"]   .cta{ background:rgba(108,99,255,.18);border-color:rgba(108,99,255,.55); }
.app-tile[data-accent="violet"] .cta{ background:rgba(139,92,255,.16);border-color:rgba(139,92,255,.5); }
.app-tile:hover .cta{ transform:translateY(-1px);box-shadow:0 12px 28px -12px rgba(0,0,0,.85); }
.app-tile[data-accent="red"]:hover    .cta{ background:rgba(255,84,112,.3); }
.app-tile[data-accent="peri"]:hover   .cta{ background:rgba(108,99,255,.32); }
.app-tile[data-accent="violet"]:hover .cta{ background:rgba(139,92,255,.3); }
.cta .arrow{ transition:transform .25s; }
.app-tile:hover .cta .arrow{ transform:translateX(5px); }
.body p{ margin-bottom:18px; }

/* status: POLECANE / NOWE */
.title-row{ display:flex;align-items:center;gap:9px;flex-wrap:wrap; }
.status{ font-size:9.5px;font-weight:800;letter-spacing:.08em;padding:4px 9px;border-radius:999px;white-space:nowrap; }
.status.polecane{ color:#231603;background:linear-gradient(135deg,#ffe08a,#ffb24d); }
.status.nowe{ color:#04160e;background:linear-gradient(135deg,#73f3b8,#34d399); }

/* SOON (niedziałające jeszcze) */
.app-tile.soon{ cursor:default; }
.app-tile.soon:hover{ transform:none;box-shadow:none;border-color:var(--border);background:var(--card); }
.app-tile.soon .mock{ filter:blur(5px);opacity:.45; }
.app-tile.soon .body h3{ opacity:.9; }
.soon-overlay{ position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4; }
.soon-badge{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;letter-spacing:.28em;color:#fff;
  border:1px solid var(--border-hover);background:rgba(8,7,14,.5);backdrop-filter:blur(2px);
  padding:9px 20px;border-radius:999px;box-shadow:0 12px 32px -12px #000;
}
.cta.disabled{ background:rgba(255,255,255,.03);border-color:var(--border);color:var(--muted-2);cursor:default; }

/* mockup: Wtyczka YT */
.yt{ padding:16px; }
.yt-player{ height:96px;border-radius:11px;background:linear-gradient(180deg,#2a0d12,#140a0f);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:13px; }
.yt-play{ width:0;height:0;border-style:solid;border-width:11px 0 11px 19px;border-color:transparent transparent transparent #ff3b3b;filter:drop-shadow(0 0 12px rgba(255,59,59,.6));margin-left:4px; }
.yt-meta{ display:flex;align-items:center;gap:11px; }
.yt-dot{ width:30px;height:30px;border-radius:50%;background:var(--panel-2); }
.yt-lines{ flex:1; }
.yt-lines span{ display:block;height:7px;border-radius:5px;background:rgba(255,255,255,.1);margin-bottom:6px; }
.yt-lines span.s{ width:55%; }
.yt-dl{ width:28px;height:28px;border-radius:8px;background:rgba(255,59,59,.16);border:1px solid rgba(255,59,59,.4);color:#ff8a8a;display:flex;align-items:center;justify-content:center;font-size:14px; }

/* POPUP licencji */
.modal-backdrop{ position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(4,3,8,.74);backdrop-filter:blur(7px); }
.modal-backdrop.open{ display:flex; }
.modal{ position:relative;max-width:410px;width:100%;background:var(--panel);border:1px solid var(--border-hover);border-radius:22px;padding:32px 26px 26px;text-align:center;box-shadow:0 50px 120px -30px #000; }
.modal-x{ position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;cursor:pointer;transition:color .2s,background .2s; }
.modal-x:hover{ color:#fff;background:rgba(255,255,255,.08); }
.m-ico{ width:56px;height:56px;border-radius:17px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#feda75,#fa7e1e 28%,#d62976 62%,#962fbf 92%);box-shadow:0 0 32px rgba(214,41,118,.5); }
.m-ico svg{ width:28px;height:28px; }
.modal h4{ font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;margin-bottom:10px; }
.modal p{ color:var(--muted);font-size:14px;margin-bottom:18px; }
.m-btn{ display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px;border-radius:13px;text-decoration:none;font-weight:600;font-size:14.5px;color:#fff;margin-top:10px;transition:transform .2s,background .2s; }
.m-btn:hover{ transform:translateY(-2px); }
.m-btn.primary{ background:linear-gradient(135deg,var(--violet),var(--magenta)); }
.m-btn.ig{ background:rgba(255,255,255,.05);border:1px solid var(--border-hover); }
.m-btn svg{ width:18px;height:18px; }

/* ---------- MOCKUP: panel bazowy ---------- */
.mock{
  width:100%;max-width:300px;background:var(--panel);border:1px solid var(--border);border-radius:15px;
  box-shadow:0 26px 60px -24px rgba(0,0,0,.85);overflow:hidden;
}

/* ===== Downloader: wybór formatu ===== */
.dl{ padding:13px; transform:scale(.9); transform-origin:center; }
.dl-head{ display:flex;align-items:center;justify-content:space-between;margin-bottom:9px; }
.dl-head b{ font-size:14px; }
.dl-x{ width:23px;height:23px;border-radius:50%;background:var(--panel-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px; }
.dl-label{ font-size:9.5px;letter-spacing:.12em;color:var(--muted-2);margin:7px 2px 4px; }
.dl-row{ display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;margin-bottom:4px; }
.dl-row .ic{ width:28px;height:28px;border-radius:8px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;color:var(--muted); }
.dl-row .ic svg{ width:16px;height:16px; }
.dl-row b{ display:block;font-size:13px; }
.dl-row small{ color:var(--muted-2);font-size:11px; }
.dl-row.hot{ background:linear-gradient(90deg, rgba(255,84,112,.18), rgba(255,84,112,.06));border:1px solid rgba(255,84,112,.35); }
.dl-row.hot .ic{ background:rgba(255,84,112,.22);color:#ff8a9c; }

/* ===== True BPM ===== */
.bpm{ padding:16px; }
.bpm-top{ display:flex;align-items:center;justify-content:space-between;margin-bottom:6px; }
.bpm-top .lab{ font-size:10px;letter-spacing:.14em;color:var(--muted-2); }
.bpm-pill{ font-size:10.5px;font-weight:600;color:#fff;background:var(--peri);padding:5px 10px;border-radius:8px;box-shadow:0 0 16px rgba(108,99,255,.5); }
.bpm-big{ font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:42px;letter-spacing:-.02em;line-height:1;margin:2px 0 14px; }
.bpm-big span{ font-size:20px;color:var(--muted);margin-left:6px; }
.bpm-btn{ text-align:center;font-size:12.5px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--peri);padding:11px;border-radius:10px;box-shadow:0 12px 28px -10px rgba(108,99,255,.7);margin-bottom:14px; }
.bpm-r{ display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.025);margin-bottom:6px; }
.bpm-r .n{ font-size:11.5px;color:var(--muted-2);width:30px; }
.bpm-r .v{ font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;flex:1; }
.bpm-r .cp{ font-size:9.5px;font-weight:700;letter-spacing:.05em;color:#cfcaff;background:rgba(108,99,255,.22);padding:4px 8px;border-radius:6px; }

/* ===== Jaki to type beat? ===== */
.tb{ padding:20px 16px;text-align:center; }
.tb-title{ font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:19px;display:inline-flex;align-items:center;gap:8px;margin-bottom:14px; }
.tb-note{ color:var(--violet); }
.tb-beta{ font-family:'Inter',sans-serif;font-style:normal;font-size:9px;font-weight:700;letter-spacing:.1em;color:#c9b8ff;border:1px solid rgba(139,92,255,.5);padding:3px 7px;border-radius:999px;background:rgba(139,92,255,.12); }
.tb-chips{ display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px; }
.tb-chips span{ font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:6px 11px;background:rgba(255,255,255,.02); }
.tb-input{
  display:flex;align-items:center;gap:10px;text-align:left;font-size:11.5px;color:var(--muted-2);
  background:var(--panel-2);border:1px solid var(--border);border-radius:13px;padding:12px 13px;
}
.tb-input .txt{ flex:1; }
.tb-send{ width:26px;height:26px;border-radius:50%;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0; }

/* =================== FOOTER (sociale w stylu apki) =================== */
.foot{
  display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  padding:18px 0 30px;
}
.soc-pill{
  display:inline-flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);font-size:13.5px;font-weight:600;
  border:1px solid var(--border-hover);border-radius:999px;padding:10px 18px;background:rgba(255,255,255,.03);
  transition:background .2s,border-color .2s;
}
.soc-pill:hover{ background:rgba(255,255,255,.07); }
.soc-pill svg{ width:17px;height:17px; }
.soc-pill[data-net="discord"] svg{ color:#8b93ff; }
.soc-pill[data-net="instagram"] svg{ color:#ff7ac9; }
.soc-pill[data-net="tiktok"] svg{ color:#7fe9e0; }
.copyright{ text-align:center;color:var(--muted-2);font-size:12.5px;padding-bottom:46px; }

/* =================== RESPONSIVE =================== */
@media (max-width:880px){ .apps{ grid-template-columns:1fr;max-width:420px;margin:0 auto; } }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HERO ============ -->
  <header>

  <main class="apps" id="apps"></main>

/* =========================================================

const ICONS = {
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>',
  tiktok:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 3c.3 2 1.5 3.6 3.4 3.9v2.6c-1.4 0-2.7-.4-3.9-1.1v6.1c0 3.2-2.6 5.8-5.8 5.8S4.5 17.7 4.5 14.5s2.6-5.8 5.8-5.8c.3 0 .6 0 .9.1V11c-.3-.1-.6-.2-.9-.2-1.6 0-2.9 1.3-2.9 2.9s1.3 2.9 2.9 2.9 2.9-1.3 2.9-2.9V3h3.4z"/></svg>',
  discord:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.3 5.6A16 16 0 0 0 15.4 4.3l-.2.4c1.7.4 2.5.9 3.4 1.6a13 13 0 0 0-10.8 0c.9-.7 1.8-1.2 3.4-1.6l-.2-.4A16 16 0 0 0 7 5.6C4.7 9 4.1 12.4 4.4 15.7A16 16 0 0 0 9.2 18l.6-.9c-.8-.3-1.5-.7-2.1-1.2l.5-.4a11.4 11.4 0 0 0 9.6 0l.5.4c-.7.5-1.4.9-2.2 1.2l.6.9a16 16 0 0 0 4.8-2.3c.4-3.8-.6-7.2-2.8-10.1zM9.7 14c-.8 0-1.4-.7-1.4-1.6s.6-1.6 1.4-1.6 1.4.7 1.4 1.6S10.5 14 9.7 14zm4.6 0c-.8 0-1.4-.7-1.4-1.6s.6-1.6 1.4-1.6 1.4.7 1.4 1.6S15.1 14 14.3 14z"/></svg>',
  video:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="2.5" y="6.5" width="12" height="11" rx="2.5"/><path d="M14.5 10.5l6-3v9l-6-3z"/></svg>',
  note:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 17V6.2l9-1.7V14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="6" cy="17.4" r="2.6"/><circle cx="15" cy="15.7" r="2.6"/></svg>'
};

const isExt = h => /^https?:/.test(h);
const ext = h => isExt(h) ? ' target="_blank" rel="noopener"' : '';

function art(type){
  if(type==='downloader') return `
    <div class="mock dl">
      <div class="dl-head"><b>Wybierz format</b><span class="dl-x">✕</span></div>
      <div class="dl-label">VIDEO</div>
      <div class="dl-row"><span class="ic">${ICONS.video}</span><div><b>MP4 4K</b><small>Najwyższa jakość</small></div></div>
      <div class="dl-row"><span class="ic">${ICONS.video}</span><div><b>MP4 1080p</b><small>Polecane</small></div></div>
      <div class="dl-label">AUDIO</div>
      <div class="dl-row hot"><span class="ic">${ICONS.note}</span><div><b>MP3</b><small>Mała waga</small></div></div>
      <div class="dl-row"><span class="ic">${ICONS.note}</span><div><b>WAV</b><small>Bezstratny</small></div></div>
    </div>`;
  if(type==='bpm') return `
    <div class="mock bpm">
      <div class="bpm-top"><span class="lab">TEMPO</span><span class="bpm-pill">BPM Z DAW</span></div>
      <div class="bpm-big">70<span>BPM</span></div>
      <div class="bpm-btn">ANALIZUJ BPM</div>
      <div class="bpm-r"><span class="n">1/4</span><span class="v">214.29 ms</span><span class="cp">KOPIUJ</span></div>
      <div class="bpm-r"><span class="n">1/8</span><span class="v">107.14 ms</span><span class="cp">KOPIUJ</span></div>
      <div class="bpm-r"><span class="n">1/16</span><span class="v">53.57 ms</span><span class="cp">KOPIUJ</span></div>
    </div>`;
  if(type==='typebeat') return `
    <div class="mock tb">
      <div class="tb-title"><span class="tb-note">♫</span> jaki to type beat? <span class="tb-beta">BETA</span></div>
      <div class="tb-chips"><span>Don Toliver</span><span>Trippie Redd</span><span>Kabe</span><span>Oki</span><span>Ken Carson</span></div>
      <div class="tb-input"><span class="txt">Wklej link, artystę, numer albo opis brzmienia…</span><span class="tb-send">↑</span></div>
    </div>`;
  if(type==='yt') return `
    <div class="mock yt">
      <div class="yt-player"><span class="yt-play"></span></div>
      <div class="yt-meta"><span class="yt-dot"></span><div class="yt-lines"><span></span><span class="s"></span></div><span class="yt-dl">↓</span></div>
    </div>`;
  return '';
}

// kafelki
const statusPill = s =>
  s==='polecane' ? '<span class="status polecane">POLECANE</span>' :
  s==='nowe'     ? '<span class="status nowe">NOWE</span>' : '';

document.getElementById('apps').innerHTML = APPS.map(a=>{
  const soon = a.status==='soon';
  const tag  = soon ? 'div' : 'a';
  const hrefAttr = soon ? '' : ` href="${a.href}"${ext(a.href)}`;
  const popupAttr = (a.popup && !soon) ? ' data-popup="1"' : '';
  const overlay = soon ? '<div class="soon-overlay"><span class="soon-badge">SOON</span></div>' : '';
  const cta = soon
    ? '<span class="cta disabled">Wkrótce</span>'
    : `<span class="cta">${a.cta} <span class="arrow">→</span></span>`;
  return `<${tag} class="app-tile${soon?' soon':''}" data-accent="${a.accent}"${hrefAttr}${popupAttr}>
    <span class="glow"></span>
    <div class="stage">
      ${art(a.art)}
      ${overlay}
    </div>
    <div class="body">
      <span class="kicker">${a.badge}</span>
      <div class="title-row"><h3>${a.title}</h3>${statusPill(a.status)}</div>
      <p>${a.desc}</p>
      ${cta}
    </div>
  </${tag}>`;
}).join('');

// footer sociale (pigułki)
document.getElementById('foot').innerHTML = `
  <a class="soc-pill" data-net="discord" href="${SOCIALS.discord}" target="_blank" rel="noopener">${ICONS.discord} Club Friday</a>
  <a class="soc-pill" data-net="instagram" href="${SOCIALS.instagram}" target="_blank" rel="noopener">${ICONS.instagram} @itsfridaydaniel</a>
  <a class="soc-pill" data-net="tiktok" href="${SOCIALS.tiktok}" target="_blank" rel="noopener">${ICONS.tiktok} TikTok</a>`;

// popup o licencji (downloader) — przechwytuje klik i pokazuje okienko
const licenseModal = document.getElementById('licenseModal');
const closeModal = () => licenseModal.classList.remove('open');
document.querySelectorAll('[data-popup]').forEach(el=>{
  el.addEventListener('click', e=>{ e.preventDefault(); licenseModal.classList.add('open'); });
});
licenseModal.addEventListener('click', e=>{ if(e.target===licenseModal) closeModal(); });
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
